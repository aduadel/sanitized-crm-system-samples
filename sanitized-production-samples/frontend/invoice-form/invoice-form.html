<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoice Form Sample</title>

    <link rel="stylesheet" href="./invoice-form.css" />
  </head>

  <body>
    <main class="container">
      <h1 class="heading">Create Invoice</h1>

      <form id="invoice-form" class="form-card">
        <div class="form-row">
          <label>Subject</label>
          <input type="text" id="subject" required />
        </div>

        <div class="form-row">
          <label>Client</label>
          <input
            type="text"
            id="client"
            placeholder="Search client..."
            required
          />
        </div>

        <div class="form-row">
          <label>Status</label>
          <select id="status" required>
            <option value="" disabled selected>Select status</option>
            <option value="Created">Created</option>
          </select>
        </div>

        <div class="form-row">
          <label>Currency</label>
          <select id="currency" required>
            <option value="" disabled selected>Select currency</option>
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
          </select>
        </div>

        <div class="form-row">
          <label>Total Amount</label>
          <input type="number" id="total_amount" required />
        </div>

        <div class="form-row">
          <label>Discount</label>
          <input type="number" id="discount" value="0" min="0" />
        </div>

        <div class="form-row">
          <label>Month No</label>
          <input type="number" id="month_no" required />
        </div>

        <div class="form-row">
          <label>Invoice Date</label>
          <input type="date" id="invoice_date" required />
        </div>

        <div class="form-row">
          <label>Last Reminder Date</label>
          <input type="date" id="last_reminder_date" />
        </div>

        <div class="form-row">
          <label>How Many Students</label>
          <input type="number" id="students_count" min="0" />
        </div>

        <div id="students-container">
          <!-- Students fields will be generated by JS -->
        </div>

        <button type="submit" class="save-btn">Create Invoice</button>
      </form>

      <pre id="result-box" class="result-box"></pre>
    </main>

    <script src="./invoice-form.js"></script>
  </body>
</html>
